<!doctype html>
<html>
  <head>
    <title>Collective Mind</title>
  </head>

  <body style="font-family: sans-serif; text-align: center; margin-top: 50px">
    <h2>Love?</h2>

    <input id="word" placeholder="Enter a word..." />
    <button onclick="send()">Send</button>

    <script>
      async function send() {
        const word = document.getElementById("word").value;

        // 👉 1. hole letztes keyword
        const res = await fetch(
          "https://ungnwrtlrmbasmukwwml.supabase.co/rest/v1/keywords?select=keyword&order=id.desc&limit=1",
          {
            headers: {
              apikey: "DEIN_ANON_KEY",
              Authorization: "Bearer DEIN_ANON_KEY",
            },
          },
        );

        const data = await res.json();

        let latestKeyword = "";
        if (data.length > 0) {
          latestKeyword = data[0].keyword;
        }

        // 👉 2. sende beides an words Tabelle
        await fetch("https://ungnwrtlrmbasmukwwml.supabase.co/rest/v1/words", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: "DEIN_ANON_KEY",
            Authorization: "Bearer DEIN_ANON_KEY",
          },
          body: JSON.stringify({
            text: word,
            con_word: latestKeyword,
          }),
        });

        alert("Sent!");
      }
    </script>

    <!-- getting words -->

    <script>
      async function loadKeyword() {
        const url =
          "https://ungnwrtlrmbasmukwwml.supabase.co/rest/v1/keywords?select=keyword&order=id.desc&limit=1";

        const res = await fetch(url, {
          headers: {
            apikey: "sb_publishable_VU5ebnrUHOSGd_H5r2AS8A_5tUgU4lH",
            Authorization:
              "Bearer sb_publishable_VU5ebnrUHOSGd_H5r2AS8A_5tUgU4lH",
          },
        });

        const data = await res.json();

        if (data.length > 0) {
          const latestKeyword = data[0].keyword;

          // 👉 H2 ändern
          document.querySelector("h2").textContent = latestKeyword;
        }
      }

      // einmal laden
      loadKeyword();

      // optional: live refresh
      setInterval(loadKeyword, 3000);
    </script>
  </body>
</html>
